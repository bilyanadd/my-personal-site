
<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Аз - [Твоето Име]</title>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); color: white; text-align: center; padding: 40px; margin: 0; }
    h1 { font-size: 3em; margin-bottom: 20px; }
    .fact { background: rgba(255,255,255,0.15); margin: 20px auto; padding: 25px; border-radius: 15px; max-width: 700px; }
    button { margin-top: 30px; padding: 12px 30px; font-size: 1.1em; background: white; color: #667eea; border: none; border-radius: 50px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Здравей! Аз съм [Твоето Име]</h1>
  <p>Интересни факти за мен:</p>

  <div class="fact" id="fact-display">Зареждане...</div>
  <button onclick="loadRandomFact()">Нов факт</button>

  <script>
    async function loadRandomFact() {
      try {
        const res = await fetch('http://localhost:3000/facts');
        const facts = await res.json();
        const random = facts[Math.floor(Math.random() * facts.length)];
        document.getElementById('fact-display').innerHTML = random.text;
      } catch(e) {
        document.getElementById('fact-display').innerHTML = 'Грешка при връзка с базата данни';
      }
    }
    window.onload = loadRandomFact;
  </script>
</body>
</html>
